name: 'C++ CI'

on:
  push:
    branches:
      - master
      - feature/github_actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y
      
      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON
      
      - name: Build
        run: cmake --build .
      
      - name: Run tests
        run: cmake --build . --target test
        id: tests
        continue-on-error: true
      
      - name: Check tests status
        if: steps.tests.outcome == 'failure'
        run: exit 1

  docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install doxygen -y
      
      - name: Generate Doxygen documentation
        run: doxygen Doxyfile
      
      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./docs/html
      
      - name: Deploy to GitHub Pages
        if: github.repository == 'NoreynCode/hw_4' && github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v2

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y
      
      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON
      
      - name: Build
        run: cmake --build .
      
      - name: Package
        run: cmake --build . --target package
      
      - name: Create Release
        if: github.repository == 'NoreynCode/hw_4'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: github.repository == 'NoreynCode/hw_4'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./sfinae-0.0.${{ github.run_number }}-Linux.deb
          asset_name: sfinae-0.0.${{ github.run_number }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package