name: 'C++ CI'

on:
  push:
    branches:
      - master
      - feature/github_actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y
      
      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON
      
      - name: Build
        run: cmake --build .
      
      - name: Run tests
        run: cmake --build . --target test
        id: tests
        continue-on-error: true
      
      - name: Check tests status
        if: steps.tests.outcome == 'failure'
        run: exit 1

  docs:
    needs: test
    if: github.repository == 'NoreynCode/hw_4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install doxygen -y
      
      - name: Generate Doxygen documentation
        run: doxygen Doxyfile
      
      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./docs/html
          retention-days: 1
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
      
      - name: Output documentation URL
        run: |
          SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "=================================================="
          echo "📚 Документация доступна по адресу:"
          echo "🔗 $SITE_URL"
          echo "=================================================="
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

  build-and-release:
    needs: test
    if: github.repository == 'NoreynCode/hw_4'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install libboost-test-dev -y
      
      - name: Configure CMake
        run: cmake . -DPATCH_VERSION=${{ github.run_number }} -DWITH_BOOST_TEST=ON
      
      - name: Build
        run: cmake --build .
      
      - name: Package
        run: cmake --build . --target package
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./sfinae-0.0.${{ github.run_number }}-Linux.deb
          asset_name: sfinae-0.0.${{ github.run_number }}-Linux.deb
          asset_content_type: application/vnd.debian.binary-package